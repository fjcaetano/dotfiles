Include ~/.colima/ssh_config

Host *
  IdentityAgent "~/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock"

# Home
Host pi3
  HostName pi3.local
  User flavio

Host oldmac
  HostName oldmac.lan
  User flaviocaetano
  IPQoS throughput

Host windows
  HostName windows.lan
  User flavio

Host wheatley
  HostName wheatley.lan
  User flavio

# Github
Host github-pvt
  HostName github.com
  IdentityAgent none
  IdentitiesOnly yes
  IdentityFile ~/.ssh/id_ecdsa_sk_bio
  IdentityFile ~/.ssh/id_ecdsa_sk_non_bio
  ControlMaster auto
